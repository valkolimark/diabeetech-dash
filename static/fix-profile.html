<!DOCTYPE html>
<html>
<head>
    <title>Fix Profile - Diabeetech</title>
    <meta charset="utf-8">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>
    <h1>Profile Fix Tool</h1>
    <p>This will inject a profile and redirect to the main page.</p>
    
    <script>
    // Save the profile data to multiple places
    var profileData = {
      "_id": "6745a000000000000000000a",
      "defaultProfile": "Default",
      "store": {
        "Default": {
          "dia": 4,
          "timezone": "America/Chicago",
          "carbratio": [{"time": "00:00", "value": 10}],
          "sens": [{"time": "00:00", "value": 50}],
          "basal": [{"time": "00:00", "value": 1.0}],
          "target_low": [{"time": "00:00", "value": 80}],
          "target_high": [{"time": "00:00", "value": 120}],
          "units": "mg/dl"
        }
      },
      "startDate": "2025-01-01T00:00:00.000Z",
      "mills": 1735689600000,
      "units": "mg/dl"
    };
    
    // Save to localStorage
    localStorage.setItem('cachedProfile', JSON.stringify([profileData]));
    localStorage.setItem('forceProfile', 'true');
    
    // Also save a flag to override the check
    localStorage.setItem('skipProfileCheck', 'true');
    
    console.log('Profile fix applied');
    
    // Redirect to main page
    setTimeout(function() {
      window.location.href = '/';
    }, 1000);
    
    document.write('<p>Profile fix applied. Redirecting to main page...</p>');
    </script>
</body>
</html>
